inherit: null # relative path for inherit yaml

alias:
  dd: dac.core.data
  da: dac.core.actions
  mt: dac.modules.timedata
  mv: dac.modules.nvh
  md: dac.modules.drivetrain
  mp: dac.modules.pch

data:
  _: # for now only add data to global context
  - /dd/SimpleDefinition
  - /md/GearboxDefinition

actions:
  _: # the actions for global context
  - /da/Separator
  - "[Drivetrain]"
  - /md/actions.CreateBearing
  - /md/actions.CreateGearboxWithBearings
  - /md/actions.CreateOrdersOfGearbox
  - "[PCH]"
  - /mp/actions.LoadChannelAction
  - /mp/actions.PreviewChannelAction
  - /mp/actions.SelectTimeRangeAction
  
  /dd/SimpleDefinition:
  - /da/Separator
  - "[Time domain]" # section hint
  - /mt/actions.LoadAction
  - dac.modules.timedata.construct.SignalConstructAction # same as /mt/construct.SignalConstructAction
  - /mt/actions.ShowTimeDataAction
  - /md/actions.ShowTimeDataWithFreqLines
  - "[Time data>]"
  - /mt/actions.CounterToTachoAction
  - /mt/actions.PulseToAzimuthAction
  - /mt/actions.TruncAction
  - /mt/actions.FilterAction
  - "[<]"
  - "[Freq domain]"
  - /mv/actions.ToFreqDomainAction
  - /md/actions.ShowSpectrumWithFreqLines
  - /mv/actions.ToFreqIntermediateAction
  - /mv/actions.ViewFreqIntermediateAction
  - "[Freq data>]"
  - /mv/actions.AverageIntermediateAction
  - /mv/actions.FilterSpectrumAction
  - /mv/actions.SpectrumToTimeAction
  - "[<]"
  - /mv/actions.ShowSpectrumWithGuesser
  - "[PCH]"
  - /mp/actions.LoadAndCropAction

quick_actions: # [action_type, data_param_name, other_params, mode?]
  # mode: false (default) → run only
  #       true            → run + save to action list
  #       "create"        → save to action list, don't run
  # For SAB: data nodes go to the first sub-action. other_params holds config for other sub-actions.
  #   e.g. [/da/A1A2, sec, {A2: {amp: 5.0}}]
  /mt/TimeData:
  - [/mt/actions.ShowTimeDataAction, channels, {}]
  /mv/data.FreqDomainData:
  - [/mv/actions.ViewFreqDomainAction, channels, {with_phase: true}]

quick_tasks:
  /mt/actions.LoadAction:
  - [/mt/tasks.FillFpathsTask, "Select measurement files"]
  /mp/actions.LoadChannelAction:
  - [/mt/tasks.FillFpathsTask, "Select measurement files"]
  /mp/actions.SelectTimeRangeAction:
  - [/mp/tasks.SetupAnalysisContextTask, "Setup Analysis Context"]

drop_actions:
  ".tdms":
    - [/mt/actions.LoadAction, fpaths, {}]
    - [/mp/actions.LoadChannelAction, fpaths, {}]
  "folder/":
    - [/mt/actions.LoadAction, fpaths, {}]
    - [/mp/actions.LoadChannelAction, fpaths, {}]
  "*":
    - [/mt/actions.LoadAction, fpaths, {}]